<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>React Single Page Layout</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Times New Roman", serif;
    background:#f2f2f2;
    line-height:1.6;
}

header,
footer{
    background:#e8173e;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

section{
    background:white;
    margin:20px 0;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
}

ul{
    padding-left:20px;
}

li{
    margin:8px 0;
}

/* Mobile */
@media (max-width:600px){
    header h1{
        font-size:1.8rem;
    }

    section{
        padding:15px;
    }

    h2{
        font-size:1.3rem;
    }
}

/* Tablet */
@media (min-width:601px) and (max-width:992px){
    header h1{
        font-size:2.2rem;
    }

    section{
        padding:25px;
    }
}

/* Laptop & Desktop */
@media (min-width:993px){
    header h1{
        font-size:2.8rem;
    }

    section{
        padding:30px;
    }
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function Header(){
    return(
        <header>
            <h1>My React Website</h1>
            <p>Single Page Application</p>
        </header>
    );
}

function About(){
    return(
        <section>
            <h2>About</h2>
            <p>
                This page is created using basic React.js components.
                It is fully responsive and works on mobile, tablet,
                laptop and desktop screens.
            </p>
        </section>
    );
}

function Services(){
    return(
        <section>
            <h2>Services</h2>
            <ul>
                <li>Web Design</li>
                <li>Frontend Development</li>
                <li>UI Development</li>
            </ul>
        </section>
    );
}

function Footer(){
    return(
        <footer>
            <p>© 2026 React Application</p>
        </footer>
    );
}

function App(){
    return(
        <div>
            <Header />

            <div className="container">
                <About />
                <Services />
            </div>

            <Footer />
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
