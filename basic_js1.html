<!DOCTYPE html>
<html>
<head>
    <title>Basic js</title>
</head>
<body>
    <button onclick="showmessage()">Click me</button><br><br>
    <script>
        function showmessage()
        {
            alert("Error!!!")
        }
    </script>

       Enter your Name: <input type="text" id="name"><br><br>
       <button onclick="showName()">Submit</button>
       <p id="result"></p>
       <script>
           function showName()
           {
             let username=document.getElementById("name").value;
             document.getElementById("result").innerHTML="Hello "+username;
           }
       </script>
</body>
</html>
