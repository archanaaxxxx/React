<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Example</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>

<body style="background-color: cadetblue;color: black;font-weight: bold;">

<div class="container">

<h2 style="text-align: center; color: rgb(36, 60, 182); font-weight: bold;">Glyphicon Demo</h2>

<p>Envelope icon: <span class="glyphicon glyphicon-envelope"></span></p>

<p>Envelope icon as link:
<a href="#"><span class="glyphicon glyphicon-envelope"></span></a>
</p>

<p>Search icon: <span class="glyphicon glyphicon-search"></span></p>

<p>Search icon inside a button:
<button type="button" class="btn btn-default">
<span class="glyphicon glyphicon-search"></span> Search
</button>
</p>

<p>Search icon with styled button:
<button type="button" class="btn btn-info">
<span class="glyphicon glyphicon-search"></span> Search
</button>
</p>

<p>Print icon: <span class="glyphicon glyphicon-print"></span></p>

<p>Print icon in a styled link:
<a href="#" class="btn btn-success btn-lg">
<span class="glyphicon glyphicon-print"></span> Print
</a>
</p>

</div>

</body>
</html>
