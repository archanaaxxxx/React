<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Floating Label Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: darksalmon;
        }

        .form-container {
            background-color: rgb(76, 43, 226);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px white;
            max-width: 600px;
            margin: 50px auto;
        }

        .form-container h3,
        .form-container label {
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="form-container">
        <h3 class="text-center mb-4">Floating Label Form</h3>

        <form>

            <!-- Full Name -->
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingName" placeholder="Full Name">
                <label for="floatingName">Full Name</label>
            </div>

            <!-- Email -->
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingEmail" placeholder="Email Address">
                <label for="floatingEmail">Email Address</label>
            </div>

            <!-- Message -->
            <div class="form-floating mb-3">
                <textarea class="form-control" placeholder="Leave a message here" id="floatingMessage" style="height: 100px"></textarea>
                <label for="floatingMessage">Message</label>
            </div>

            <!-- Phone -->
            <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="floatingPhone" placeholder="Phone Number">
                <label for="floatingPhone">Phone Number</label>
            </div>

            <!-- Select City -->
            <div class="form-floating mb-4">
                <select class="form-select" id="floatingSelect" aria-label="Select City">
                    <option selected>Choose a city</option>
                    <option value="1">Chennai</option>
                    <option value="2">Madurai</option>
                    <option value="3">Delhi</option>
                    <option value="4">Thoothukudi</option>
                </select>
                <label for="floatingSelect">Select City</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-light w-100">Submit</button>

        </form>
    </div>
</div>

</body>
</html>
