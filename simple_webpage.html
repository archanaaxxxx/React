<!DOCTYPE html>
<html>
<head>
    <title>Contact Page</title>
</head>

<body style="font-family: Arial; background-color:#f0f0f0; padding:20px;">

<div style="max-width:800px; margin:auto;">

   
    <div style="background-color:#673ab7; color:white; padding:15px; border-radius:8px;">
        <h2 style="margin:0;">Contact Us</h2>
        <p style="margin:5px 0 0;">We would love your feedback!</p>
    </div>

    
    <div style="margin:15px 0;">
        <button style="background:#ff9800; color:white; border:none; padding:8px 15px; border-radius:5px;">
            Home
        </button>

        <button style="background:#009688; color:white; border:none; padding:8px 15px; border-radius:5px;">
            About
        </button>
    </div>

    
    <div style="background:white; padding:20px; border-radius:10px; margin-bottom:20px;">
        
        <h3>Send Message</h3>

        <label>Name</label><br>
        <input type="text" placeholder="Your name"
        style="width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc;"><br>

        <label>Message</label><br>
        <textarea placeholder="Write your message"
        style="width:100%; padding:10px; height:80px; margin:8px 0; border-radius:5px; border:1px solid #ccc;"></textarea><br>

        <button style="background:#4caf50; color:white; padding:10px 15px; border:none; border-radius:5px;">
            Send
        </button>

    </div>

    <div style="background:white; padding:20px; border-radius:10px;">
        
        <h3>Recent Feedback</h3>

        <table style="width:100%; border-collapse:collapse;">
            <tr style="background:#673ab7; color:white;">
                <th style="padding:10px;">Name</th>
                <th style="padding:10px;">Message</th>
            </tr>

            <tr>
                <td style="padding:10px; border-bottom:1px solid #ddd;">Achu</td>
                <td style="padding:10px; border-bottom:1px solid #ddd;">Great service!</td>
            </tr>

            <tr>
                <td style="padding:10px; border-bottom:1px solid #ddd;">Priya</td>
                <td style="padding:10px; border-bottom:1px solid #ddd;">Very helpful page.</td>
            </tr>

            <tr>
                <td style="padding:10px;">Nikisha</td>
                <td style="padding:10px;">Nice experience.</td>
            </tr>
        </table>

    </div>

</div>

</body>
</html>
